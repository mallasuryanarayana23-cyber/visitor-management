<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's List - Guard | VMS</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Toastr -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet" />
    <!-- DataTables -->
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet" />
    <style>
        .sidebar-green {
            background-color: #198754;
            min-height: 100vh;
            color: white;
        }
        .sidebar-green a {
            color: #d1e7dd;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
        }
        .sidebar-green a:hover {
            background-color: #157347;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar-green shadow">
                <div class="position-sticky pt-3">
                    <h4 class="px-3 pb-3 border-bottom text-white">VMS Guard Post</h4>
                    <ul class="nav flex-column mt-3">
                        <li class="nav-item">
                            <a class="nav-link" href="preview_guard_dashboard.html">
                                📊 Dashboard
                            </a>
                        </li>
                        <li class="nav-item mt-2">
                            <a class="nav-link" href="preview_guard_search.html">
                                🔍 Search Visitor
                            </a>
                        </li>
                        <li class="nav-item mt-2">
                            <a class="nav-link" href="preview_guard.html">
                                📋 Today's List
                            </a>
                        </li>
                        <li class="nav-item mt-5 pt-3 border-top">
                            <a class="nav-link text-warning" href="preview_admin.html">
                                🚪 Logout
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
                    <h1 class="h2 text-success">Today's List</h1>
                </div>

                <div class="card shadow-sm mb-4">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-bordered table-hover w-100" id="guardVisitorsTable">
                <thead class="table-dark">
                    <tr>
                        <th>Visit Token</th>
                        <th>Photo</th>
                        <th>Name</th>
                        <th>Host</th>
                        <th>Purpose</th>
                        <th>Expected Time</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Example row; in real life populated via AJAX loop -->
                    <tr>
                        <td class="fw-bold">VMS-20231024-001</td>
                        <td>
                            <img src="http://fileserver/VisitorPhotos/Photos/2023/10/dummy.jpg" class="rounded-circle" width="40" height="40" onclick="openLightbox(this.src)" style="cursor:pointer;" />
                        </td>
                        <td>John Doe<br><small class="text-muted">9876543210</small></td>
                        <td>Mr. Smith (IT)</td>
                        <td>Meeting</td>
                        <td>10:00 AM</td>
                        <td><span class="badge bg-warning text-dark status-badge">Pending</span></td>
                        <td>
                            <button class="btn btn-sm btn-success checkin-btn" data-id="1">Check-In</button>
                            <button class="btn btn-sm btn-outline-info" onclick="openLightbox('http://fileserver/VisitorPhotos/IDProofs/2023/10/doc.jpg')">View ID</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

            </main>
        </div>
    </div>

    <!-- Modal Lightbox inside layout for global access -->
    <div class="modal fade" id="imageLightboxModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content border-0 bg-transparent">
                <div class="modal-body text-center p-0 position-relative">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" style="z-index: 1050;"></button>
                    <img id="lightboxImg" src="" class="img-fluid rounded shadow-lg" style="max-height: 90vh;" />
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script>
        function openLightbox(url) {
            $('#lightboxImg').attr('src', url);
            var myModal = new bootstrap.Modal(document.getElementById('imageLightboxModal'));
            myModal.show();
        }
    </script>
    <script>
        $(document).ready(function() {
            // Initialize DataTables
            var table = $('#guardVisitorsTable').DataTable({
                "pageLength": 10,
                "ordering": true,
                "order": [[ 5, "asc" ]] // Order by Expected Time
            });
            // Check-In Action
            $('#guardVisitorsTable').on('click', '.checkin-btn', function() {
                var btn = $(this);
                var visitorId = btn.data('id');
                var visitorRow = btn.closest('tr');
                Swal.fire({
                    title: 'Confirm Check-In',
                    text: 'Select Gate Number',
                    input: 'select',
                    inputOptions: {
                        '1': 'Gate 1 (Main M1)',
                        '2': 'Gate 2 (Side M2)',
                    },
                    inputPlaceholder: 'Select a gate',
                    showCancelButton: true,
                    confirmButtonText: 'Check-In',
                    inputValidator: (value) => {
                        return new Promise((resolve) => {
                            if (value) { resolve() }
                            else { resolve('You need to select a gate') }
                        })
                    }
                }).then((result) => {
                    if (result.isConfirmed) {
                        btn.html('<span class="spinner-border spinner-border-sm"></span>').prop('disabled', true);
                        var postUrl = '@Url.Action("CheckIn", "Guard")';
                        if(postUrl === '#' || postUrl.indexOf('Action') > -1) {
                            // SIMULATED DEMO MODE
                            setTimeout(function() {
                                toastr.success('Checked-In Successfully!');
                                visitorRow.find('.status-badge').removeClass('bg-warning text-dark').addClass('bg-success').text('Checked-In');
                                btn.replaceWith('<button class="btn btn-sm btn-danger checkout-btn" data-id="'+visitorId+'">Check-Out</button>');
                            }, 600);
                        } else {
                            // REAL BACKEND AJAX
                            $.post(postUrl, { visitorId: visitorId, gateId: result.value }, function(res) {
                                if(res.success){
                                    toastr.success('Checked-In Successfully!');
                                    // Update row UI
                                    visitorRow.find('.status-badge').removeClass('bg-warning text-dark').addClass('bg-success').text('Checked-In');
                                    btn.replaceWith('<button class="btn btn-sm btn-danger checkout-btn" data-id="'+visitorId+'">Check-Out</button>');
                                } else {
                                    toastr.error(res.message);
                                    btn.html('Check-In').prop('disabled', false);
                                }
                            });
                        }
                    }
                });
            });
            // Check-Out Action
            $('#guardVisitorsTable').on('click', '.checkout-btn', function() {
                var btn = $(this);
                var visitorId = btn.data('id');
                var visitorRow = btn.closest('tr');
                Swal.fire({
                    title: 'Confirm Check-Out',
                    text: "Are you sure you want to checkout this visitor?",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    confirmButtonText: 'Yes, Check-Out!'
                }).then((result) => {
                    if (result.isConfirmed) {
                        btn.html('<span class="spinner-border spinner-border-sm"></span>').prop('disabled', true);
                        var postUrl = '@Url.Action("CheckOut", "Guard")';
                        if(postUrl === '#' || postUrl.indexOf('Action') > -1) {
                            // SIMULATED DEMO MODE
                            setTimeout(function() {
                                toastr.success('Checked-Out Successfully!');
                                visitorRow.find('.status-badge').removeClass('bg-success').removeClass('bg-warning').addClass('bg-secondary').text('Checked-Out');
                                btn.remove(); // Remove button completely
                            }, 600);
                        } else {
                            // REAL BACKEND AJAX
                            $.post(postUrl, { visitorId: visitorId }, function(res) {
                                if(res.success){
                                    toastr.success('Checked-Out Successfully!');
                                    visitorRow.find('.status-badge').removeClass('bg-success').addClass('bg-secondary').text('Checked-Out');
                                    btn.remove(); // Remove button completely
                                } else {
                                    toastr.error(res.message);
                                    btn.html('Check-Out').prop('disabled', false);
                                }
                            });
                        }
                    }
                });
            });
        });
    </script>

</body>
</html>
