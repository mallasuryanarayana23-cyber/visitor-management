<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Visitor Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1e40af 100%);
            display: flex; align-items: center; justify-content: center; padding: 20px;
            overflow: hidden;
        }
        .orb1, .orb2 {
            position: fixed; border-radius: 50%; filter: blur(80px); opacity: .25; z-index: 0; pointer-events: none;
        }
        .orb1 { width:400px;height:400px;background:#3b82f6;top:-100px;left:-100px;animation:float 8s ease-in-out infinite; }
        .orb2 { width:350px;height:350px;background:#8b5cf6;bottom:-100px;right:-100px;animation:float 10s ease-in-out infinite reverse; }
        @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,30px)} }

        .login-wrapper { position:relative;z-index:1;width:100%;max-width:440px; }

        .login-card {
            background: rgba(255,255,255,.97);
            border-radius: 24px; padding: 44px 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,.35);
            animation: slideUp .5s ease;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

        .brand-logo {
            width:64px;height:64px;
            background:linear-gradient(135deg,#1e3a8a,#3b82f6);
            border-radius:18px;
            display:flex;align-items:center;justify-content:center;
            font-size:1.8rem;margin:0 auto 16px;
            box-shadow:0 8px 24px rgba(59,130,246,.45);
        }

        .form-control {
            border-radius: 10px; padding: 12px 16px;
            border: 1.5px solid #e2e8f0; font-size: .95rem;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,.12);
            outline: none;
        }
        .form-label { font-weight: 600; font-size: .875rem; color: #374151; margin-bottom: 6px; }

        .input-group-text {
            border-radius: 10px 0 0 10px;
            background: #f8fafc; border: 1.5px solid #e2e8f0;
            border-right: none; color: #64748b; font-size: 1rem;
        }
        .input-group .form-control { border-radius: 0 10px 10px 0; border-left: none; }
        .input-group:focus-within .input-group-text { border-color: #3b82f6; }

        .pw-wrap { position: relative; }
        .show-pw-btn {
            position:absolute;right:12px;top:50%;transform:translateY(-50%);
            background:none;border:none;color:#94a3b8;cursor:pointer;font-size:1rem;z-index:5;
        }

        .btn-login {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            border: none; border-radius: 12px; padding: 14px;
            font-weight: 700; font-size: 1rem; color: white;
            width: 100%; cursor: pointer;
            box-shadow: 0 4px 15px rgba(59,130,246,.4);
            transition: transform .15s, box-shadow .15s;
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(59,130,246,.5); }
        .btn-login:active { transform: translateY(0); }

        .divider { position: relative; text-align: center; margin: 22px 0 16px; }
        .divider::before { content:'';position:absolute;top:50%;left:0;right:0;border-top:1px solid #e2e8f0; }
        .divider span { position:relative;background:white;padding:0 12px;font-size:.8rem;color:#94a3b8; }

        .role-badge {
            display:inline-block; padding:6px 14px; border-radius:20px;
            font-size:.78rem; font-weight:600; cursor:pointer;
            border: 1.5px solid transparent; transition:all .15s;
        }
        .role-badge:hover { transform:scale(1.07); }
        .badge-admin { background:#fef2f2;color:#dc2626;border-color:#fecaca; }
        .badge-guard { background:#f0fdf4;color:#16a34a;border-color:#bbf7d0; }
        .badge-user  { background:#eff6ff;color:#2563eb;border-color:#bfdbfe; }

        .alert-danger-custom {
            background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
            border-radius: 10px; padding: 10px 14px; font-size: .875rem; margin-bottom: 16px;
        }

        #loginLoader { display: none; }
    </style>
</head>
<body>
    <div class="orb1"></div>
    <div class="orb2"></div>

    <div class="login-wrapper">
        <div class="login-card">

            <!-- Brand -->
            <div class="text-center mb-4">
                <div class="brand-logo">🏢</div>
                <h4 class="fw-bold text-dark mb-1">Visitor Management System</h4>
                <p class="text-muted mb-0" style="font-size:.9rem;">Sign in with your Employee ID &amp; Password</p>
            </div>

            <!-- Error placeholder -->
            <div id="loginError" class="alert-danger-custom d-none">
                ❌ <span id="loginErrorMsg">Invalid Employee ID or Password.</span>
            </div>

            <!-- Form -->
            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label class="form-label">Employee ID <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text">🪪</span>
                        <input type="text" class="form-control" id="empId" placeholder="e.g. ADMIN001" required autocomplete="username" />
                    </div>
                    <div class="text-danger small d-none mt-1" id="err-empId">Employee ID is required.</div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password <span class="text-danger">*</span></label>
                    <div class="pw-wrap">
                        <div class="input-group">
                            <span class="input-group-text">🔒</span>
                            <input type="password" class="form-control" id="password" placeholder="Enter your password" required autocomplete="current-password" />
                        </div>
                        <button type="button" class="show-pw-btn" id="togglePw">👁</button>
                    </div>
                    <div class="text-danger small d-none mt-1" id="err-pw">Password is required.</div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="loginText">Sign In →</span>
                    <span id="loginLoader"><span class="spinner-border spinner-border-sm me-2"></span>Signing in...</span>
                </button>
            </form>

            <!-- Role credentials quick fill -->
            <div class="divider mt-4"><span>Demo Credentials</span></div>
            <div class="d-flex justify-content-center gap-2 flex-wrap">
                <span class="role-badge badge-admin" onclick="fillLogin('9703436421','ramana')" title="Click to fill Admin credentials">
                    🔴 Admin
                </span>
                <span class="role-badge badge-guard" onclick="fillLogin('GUARD001','Guard@123')" title="Click to fill Guard credentials">
                    🟢 Guard
                </span>
                <span class="role-badge badge-user" onclick="fillLogin('EMP001','User@123')" title="Click to fill User credentials">
                    🔵 Employee
                </span>
            </div>
            <p class="text-center text-muted mt-2 mb-0" style="font-size:.72rem;">
                Click a role badge to auto-fill · Then click Sign In
            </p>
        </div>

        <p class="text-center text-white-50 mt-4 mb-0 small">
            © 2026 Visitor Management System
        </p>
    </div>

    <script>
        // Role credentials map
        var credentials = {
            '9703436421': { pass: 'ramana',    role: 'Admin',    redirect: 'preview_admin.html' },
            'GUARD001':   { pass: 'Guard@123', role: 'Guard',    redirect: 'preview_guard_portal.html' },
            'EMP001':     { pass: 'User@123',  role: 'Employee', redirect: 'preview_user_portal.html' }
        };

        // Merge dynamically created users from localStorage
        var customUsers = JSON.parse(localStorage.getItem('vms_custom_users') || '{}');
        for (var key in customUsers) {
            credentials[key.toUpperCase()] = customUsers[key];
        }

        // Auto-fill
        function fillLogin(empId, password) {
            document.getElementById('empId').value = empId;
            document.getElementById('password').value = password;
            document.getElementById('loginError').classList.add('d-none');
            document.getElementById('err-empId').classList.add('d-none');
            document.getElementById('err-pw').classList.add('d-none');
        }

        // Toggle password visibility
        document.getElementById('togglePw').addEventListener('click', function () {
            var inp = document.getElementById('password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            this.textContent = inp.type === 'password' ? '👁' : '🙈';
        });

        // Login form submit
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            var empId = document.getElementById('empId').value.trim();
            var pass  = document.getElementById('password').value.trim();
            var valid = true;

            document.getElementById('err-empId').classList.toggle('d-none', !!empId);
            document.getElementById('err-pw').classList.toggle('d-none', !!pass);
            if (!empId || !pass) return;

            // Show spinner
            document.getElementById('loginText').style.display = 'none';
            document.getElementById('loginLoader').style.display = 'inline';
            document.getElementById('loginBtn').disabled = true;
            document.getElementById('loginError').classList.add('d-none');

            setTimeout(function () {
                document.getElementById('loginText').style.display = 'inline';
                document.getElementById('loginLoader').style.display = 'none';
                document.getElementById('loginBtn').disabled = false;

                var user = credentials[empId.toUpperCase()];
                if (user && user.pass === pass) {
                    // Success — redirect to role portal
                    document.getElementById('loginBtn').innerHTML = '✅ Redirecting to ' + user.role + ' Portal...';
                    document.getElementById('loginBtn').style.background = 'linear-gradient(135deg,#166534,#16a34a)';
                    setTimeout(function () {
                        window.location.href = user.redirect;
                    }, 800);
                } else {
                    document.getElementById('loginErrorMsg').textContent =
                        'Invalid Employee ID or Password. Please try again.';
                    document.getElementById('loginError').classList.remove('d-none');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            }, 1000);
        });

        // Enter key submits
        document.getElementById('empId').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });
    </script>
</body>
</html>
